name: Deploy Static Test Page to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Hostinger VPS
        run: |
          curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://developers.hostinger.com/api/vps/v1/virtual-machines/${{ secrets.HOSTINGER_VM_ID }}/docker" \
            -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "project_name": "fdq-test-server",
              "content": "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/docker-compose.yml"
            }'