name: Deploy Static Test Page to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Hostinger VPS
        run: |
          BODY=$(jq -n \
            --arg project_name "fdq-test-server" \
            --arg content "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/docker-compose.yml" \
            '{project_name: $project_name, content: $content}')

          echo "Request body being sent:"
          echo "$BODY"

          curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://developers.hostinger.com/api/vps/v1/virtual-machines/${HOSTINGER_VM_ID}/docker" \
            -H "Authorization: Bearer ${HOSTINGER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY"
        env:
          HOSTINGER_VM_ID: ${{ secrets.HOSTINGER_VM_ID }}
          HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY }}