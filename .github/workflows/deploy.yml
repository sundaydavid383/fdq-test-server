name: Deploy Static Test Page to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Debug - Show constructed request
        run: |
          echo "VM ID length: ${#HOSTINGER_VM_ID}"
          echo "API key length: ${#HOSTINGER_API_KEY}"
          echo "Content URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/docker-compose.yml"
        env:
          HOSTINGER_VM_ID: ${{ secrets.HOSTINGER_VM_ID }}
          HOSTINGER_API_KEY: ${{ secrets.HOSTINGER_API_KEY }}